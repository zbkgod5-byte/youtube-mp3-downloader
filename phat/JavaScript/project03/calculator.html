<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ឧបករណ៍គិតលេខ JavaScript Array Iteration</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" class="calculator-screen" value="0" readonly />

      <div class="calculator-keys">
        <button type="button" id="b7">7</button>
        <button type="button" id="b8">8</button>
        <button type="button" id="b9">9</button>
        <button type="button" class="operator1">÷</button>

        <button type="button" id="b4">4</button>
        <button type="button" id="b5">5</button>
        <button type="button" id="b6">6</button>
        <button type="button" class="operator2">x</button>

        <button type="button" id="b1">1</button>
        <button type="button" id="b2">2</button>
        <button type="button" id="b3">3</button>
        <button type="button" class="operator3">-</button>

        <button type="button" id="delate">D</button>
        <button type="button" id="point">.</button>
        <button type="button" class="operator4">+</button>
        <button type="button" class="equal-sign">=</button>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
