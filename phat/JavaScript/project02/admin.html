<!DOCTYPE html>
<html lang="km">
<head>
    <link rel="stylesheet" href="admin.css">
    <meta charset="UTF-8">
    <title>Admin - បញ្ចូលទំនិញ</title>
</head>
<body>
<div class="admin-box">
    <h2>ប៊ែនណែលគ្រប់គ្រងទំនិញ (Admin)</h2>
    <div class="input-group">
        <label>ឈ្មោះទំនិញ</label>
        <input type="text" id="pName">
    </div>
    <div class="input-group">
        <label>តម្លៃលក់ ($)</label>
        <input type="number" id="pPrice">
    </div>
    <div class="input-group">
        <label>តម្លៃចាស់ ($)</label>
        <input type="number" id="pOldPrice">
    </div>
    <div class="input-group">
        <label>Link រូបភាព</label>
        <input type="text" id="pImg">
    </div>
    <button onclick="saveProduct()">+ បញ្ចូលទៅក្នុងហាង</button>
    <a href="shop.html" target="_blank" style="margin-left: 15px; color: #438a1c;">ទៅមើលទំព័រហាង -></a>

    <table id="adminTable">
        <thead>
            <tr>
                <th>ឈ្មោះ</th>
                <th>តម្លៃ</th>
                <th>សកម្មភាព</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="admin.js"></script
</body>
</html>
