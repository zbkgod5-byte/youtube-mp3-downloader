<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Login & Sign Up</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="visual-panel">
          <h1 id="visual-title">
            WELCOME <br />
            BACK!
          </h1>
          <p id="visual-desc">
            ចូលរួមជាមួយយើង ដើម្បីទទួលបានបទពិសោធន៍ថ្មីៗ និងការផ្តល់ជូនពិសេស។
          </p>
        </div>

        <div class="form-panel">
          <div id="signup-area">
            <h2>Sign Up</h2>
            <div class="input-box">
              <label>Username</label>
              <input type="text" id="regUser" placeholder="ឈ្មោះអ្នកប្រើ" />
              <i class="fas fa-user"></i>
            </div>
            <div class="input-box">
              <label>Email</label>
              <input type="email" id="regEmail" placeholder="អ៊ីមែល" />
              <i class="fas fa-envelope"></i>
            </div>
            <div class="input-box">
              <label>Password</label>
              <input type="password" id="regPass" placeholder="លេខសម្ងាត់" />
              <i class="fas fa-lock"></i>
            </div>
            <button type="button" id="btnSignup" class="btn-action">
              Sign Up
            </button>
            <p class="switch-text">
              Already have an account? <span onclick="showLogin()">Login</span>
            </p>
          </div>

          <div id="login-area" class="hidden">
            <h2>Login</h2>
            <div class="input-box">
              <label>Email or Username</label>
              <input type="text" id="loginUser" placeholder="អ៊ីមែល ឬឈ្មោះ" />
              <i class="fas fa-user"></i>
            </div>
            <div class="input-box">
              <label>Password</label>
              <input type="password" id="loginPass" placeholder="លេខសម្ងាត់" />
              <i class="fas fa-lock"></i>
            </div>
            <button type="button" id="btnLogin" class="btn-action">
              Login
            </button>
            <p class="switch-text">
              Don't have an account? <span onclick="showSignup()">Sign Up</span>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
