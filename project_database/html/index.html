<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2>Student Register System</h2>
            <p>Access your academic records securely</p>
        </div>

        <form class="login-form">
            <div class="form-group">
                <label for="username">Username or Student ID</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Enter your ID" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye toggle-password"></i>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember Me</span>
                </label>
                <a href="https://t.me/@PHIN_SOPHAT?text=Hello%20Teacher" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">
                Login <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="divider"></div>

        <div class="login-footer">
            New Student? <a href="https://t.me/@PHIN_SOPHAT">Register Here</a>
        </div>
    </div>
<script src="../javaScript/index.js"></script>
</body>
</html>
